services:
  - type: web
    name: worknet-backend
    env: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromValue: "" # User must provide
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromValue: "" # User must provide
      - key: CLOUDINARY_CLOUD_NAME
        fromValue: "" # User must provide
      - key: CLOUDINARY_API_KEY
        fromValue: "" # User must provide
      - key: CLOUDINARY_API_SECRET
        fromValue: "" # User must provide
      - key: SMTP_USER
        fromValue: "" # User must provide
      - key: SMTP_PASS
        fromValue: "" # User must provide
      - key: GEMINI_API_KEY
        fromValue: "" # User must provide
